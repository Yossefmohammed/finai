version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist the SQLite database across container restarts
      - db_data:/app/finai.db
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Static Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: finai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./finai_v3/frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data: