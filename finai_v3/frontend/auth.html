<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinAI — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #1a1e27;
    --border: #2a2f3d; --accent: #3b7bff; --accent2: #5b9bff;
    --green: #22c55e; --red: #ef4444;
    --text: #e8eaf0; --text2: #8b92a8; --text3: #5a6070;
    --font: 'IBM Plex Sans Arabic', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: 18px; padding: 40px; width: min(420px, 95vw); }

  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; justify-content: center; }
  .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg,#3b7bff,#7c3aed);
               border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .logo-text { font-size: 26px; font-weight: 700;
               background: linear-gradient(90deg,#3b7bff,#7c3aed);
               -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .tabs { display: flex; background: var(--surface2); border-radius: 10px;
          padding: 4px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer;
         font-size: 14px; font-weight: 500; color: var(--text2); transition: all .15s; }
  .tab.active { background: var(--accent); color: #fff; }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text2);
          margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
          color: var(--text); font-family: var(--font); font-size: 14px;
          padding: 12px 14px; border-radius: 10px; outline: none; transition: border-color .15s; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }

  .btn { width: 100%; padding: 13px; background: linear-gradient(135deg,#3b7bff,#7c3aed);
         border: none; border-radius: 10px; color: #fff; font-family: var(--font);
         font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s;
         margin-top: 8px; }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
           color: var(--red); padding: 10px 14px; border-radius: 8px;
           font-size: 13px; margin-bottom: 14px; display: none; }
  .success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3);
             color: var(--green); padding: 10px 14px; border-radius: 8px;
             font-size: 13px; margin-bottom: 14px; display: none; }

  .divider { text-align: center; color: var(--text3); font-size: 12px; margin: 16px 0; }
  .plan-note { font-size: 12px; color: var(--text3); text-align: center;
               margin-top: 16px; line-height: 1.6; }
  .plan-note span { color: var(--accent2); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💹</div>
    <div class="logo-text">FinAI</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">تسجيل الدخول</div>
    <div class="tab" onclick="showTab('register')">إنشاء حساب</div>
  </div>

  <div id="error-msg" class="error"></div>
  <div id="success-msg" class="success"></div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="login-email" placeholder="you@business.com" />
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="login-password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">دخول ←</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form" style="display:none">
    <div class="form-group">
      <label>اسم الشركة أو النشاط التجاري</label>
      <input type="text" id="reg-business" placeholder="مثال: محل ياسين للإلكترونيات" />
    </div>
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="reg-email" placeholder="you@business.com" />
    </div>
    <div class="form-group">
      <label>كلمة المرور (6 أحرف على الأقل)</label>
      <input type="password" id="reg-password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') doRegister()" />
    </div>
    <button class="btn" id="reg-btn" onclick="doRegister()">إنشاء الحساب ←</button>
    <div class="plan-note">الخطة المجانية: 100 معاملة شهرياً<br><span>يمكن الترقية لاحقاً</span></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

function showTab(tab) {
  document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
  clearMessages();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}
function clearMessages() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

function saveSession(data) {
  localStorage.setItem('finai_token', data.access_token);
  localStorage.setItem('finai_user', JSON.stringify({
    user_id: data.user_id, email: data.email,
    business_name: data.business_name, plan: data.plan
  }));
}

async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showError('أدخل البريد الإلكتروني وكلمة المرور'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'جارٍ الدخول...';
  clearMessages();

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ username: email, password })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || 'بيانات غير صحيحة'); return; }
    saveSession(data);
    showSuccess(`مرحباً ${data.business_name}! جارٍ التحويل...`);
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch {
    showError('تعذر الاتصال بالخادم. تأكد من تشغيل FastAPI.');
  } finally {
    btn.disabled = false; btn.textContent = 'دخول ←';
  }
}

async function doRegister() {
  const business  = document.getElementById('reg-business').value.trim();
  const email     = document.getElementById('reg-email').value.trim();
  const password  = document.getElementById('reg-password').value;
  if (!business || !email || !password) { showError('يرجى ملء جميع الحقول'); return; }
  if (password.length < 6) { showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'جارٍ الإنشاء...';
  clearMessages();

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, business_name: business, password })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || 'فشل إنشاء الحساب'); return; }
    saveSession(data);
    showSuccess('تم إنشاء الحساب! جارٍ التحويل...');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch {
    showError('تعذر الاتصال بالخادم. تأكد من تشغيل FastAPI.');
  } finally {
    btn.disabled = false; btn.textContent = 'إنشاء الحساب ←';
  }
}

// If already logged in → go to app
if (localStorage.getItem('finai_token')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
